services:
  - type: web
    name: playalytics-api
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn src.api:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: GAMING_ML_HOST
        value: 0.0.0.0
      - key: GAMING_ML_LOG_LEVEL
        value: INFO
      - key: GAMING_ML_RATE_LIMIT
        value: 30/minute
